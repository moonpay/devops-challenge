apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: crypto-prices
  namespace: argocd-system
spec:
  generators:
    - list:
        elements:
          - cluster: gke-europe-west2
            url: https://kubernetes.default.svc
            namespace: crypto-prices
            imageTag: "0.1.0"
            gcpProjectId: vg-moonpay-challenge
            externalSecretsEnabled: "true"
