apiVersion: v2
name: crypto-prices
description: Crypto prices app with PostgreSQL and full observability
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: postgresql
    version: "16.4.3"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled

  - name: prometheus
    version: "25.8.0"
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled

  - name: grafana
    version: "7.3.7"
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled

  - name: loki
    version: "6.55.0"
    repository: https://grafana.github.io/helm-charts
    condition: loki.enabled
