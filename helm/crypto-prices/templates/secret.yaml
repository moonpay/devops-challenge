{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: gcp-secret-store
  labels:
    {{- include "crypto-prices.labels" . | nindent 4 }}
spec:
  provider:
    gcpsm:
      projectID: {{ .Values.externalSecrets.gcpProjectId | quote }}

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: crypto-prices-external-secret
  labels:
    {{- include "crypto-prices.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: crypto-prices-secret
    creationPolicy: Owner
  data:
    - secretKey: db-password
      remoteRef:
        key: crypto-prices-db-password
    - secretKey: postgres-password
      remoteRef:
        key: crypto-prices-db-password
{{- else }}
# Fallback: plain Kubernetes secret for local/dev environments
apiVersion: v1
kind: Secret
metadata:
  name: crypto-prices-secret
  labels:
    {{- include "crypto-prices.labels" . | nindent 4 }}
type: Opaque
stringData:
  db-password: {{ .Values.secrets.dbPassword | quote }}
  postgres-password: {{ .Values.secrets.dbPassword | quote }}
{{- end }}
