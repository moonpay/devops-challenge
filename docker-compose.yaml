services:
  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: currencies
    ports:
      - 5432:5432
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d currencies"]
      interval: 5s
      timeout: 5s
      retries: 5

  nextjs:
    build: .
    restart: always
    environment:
      POSTGRES_PRISMA_URL: "postgres://postgres:postgres@postgres:5432/currencies?schema=public"
    ports:
      - 8087:3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres:
    driver: local
